<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Successful — Gee's Naturals</title>

    <meta name="robots" content="noindex">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-98SRH74RZY"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-98SRH74RZY');
    </script>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .success-page {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: var(--nav-height);
            text-align: center;
        }

        .success-card {
            max-width: 500px;
            padding: 3rem 2rem;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: var(--color-green-light);
            color: var(--color-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 1.5rem;
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .order-ref {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: var(--color-bg-alt);
            border-radius: var(--radius-sm);
            font-family: monospace;
            font-weight: 600;
            color: var(--color-text-muted);
            margin: 1rem 0 2rem;
        }

        @keyframes popIn {
            from {
                transform: scale(0);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <nav class="nav">
        <div class="container nav-inner">
            <a href="../index.html" class="nav-logo">
                <img src="../logo.svg" alt="Gee's Naturals"
                    onerror="this.style.display='none'; this.insertAdjacentHTML('afterend', '<div class=nav-logo-fallback>GN</div>')">
            </a>
            <div class="nav-links">
                <a href="../index.html">Home</a>
                <a href="../shop/index.html">Shop</a>
                <a href="../about-us/index.html">About</a>
                <a href="../contact/index.html">Contact</a>
            </div>
        </div>
    </nav>

    <main class="success-page">
        <div class="container">
            <div class="success-card">
                <div class="success-icon">
                    <i class="fa-solid fa-check"></i>
                </div>
                <h1 class="mb-1">Order Successful!</h1>
                <p class="text-muted">Thank you for choosing Gee's Naturals. We've received your order and our team is
                    prepping your fresh juices right now.</p>

                <div class="order-ref" id="order-ref">GN-LOADING...</div>

                <div style="display:flex; flex-direction:column; gap:1rem">
                    <a href="../shop/index.html" class="btn btn-primary btn-full">Continue Shopping</a>
                    <a href="https://wa.me/233503959285?text=Hello%20Gee's%20Naturals,%20I've%20just%20placed%20an%20order%20and%20need%20assistance."
                        class="btn btn-ghost btn-full">
                        <i class="fa-brands fa-whatsapp"></i> Chat with Support
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer mt-4">
        <div class="container">
            <div class="footer-bottom">
                <span>© 2024 Gee's Naturals. All rights reserved.</span>
                <span>Made with 💚 in Ghana</span>
            </div>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const ref = params.get('ref') || 'N/A';
            document.getElementById('order-ref').textContent = `Order Ref: ${ref}`;
        });
    </script>
</body>

</html>
